name: Stepstone Dashboard aktualisieren

on:
  # Mo–Fr um 07:30 Uhr (UTC+2 = 05:30 UTC)
  schedule:
    - cron: '30 5 * * 1-5'
  # Manuell auslösbar über GitHub UI
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    # Schreibrechte für git push
    permissions:
      contents: write

    steps:
      # 1. Repository auschecken
      - name: Repository auschecken
        uses: actions/checkout@v4

      # 2. Python einrichten
      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Playwright + Abhängigkeiten installieren
      - name: Playwright installieren
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # 4. Scraper ausführen
      - name: Dashboard aktualisieren
        env:
          STEPSTONE_EMAIL: ${{ secrets.STEPSTONE_EMAIL }}
          STEPSTONE_PASSWORD: ${{ secrets.STEPSTONE_PASSWORD }}
        run: python scraper.py

      # 5. Änderungen committen und pushen (nur wenn index.html geändert wurde)
      - name: Änderungen pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Keine Änderungen – nichts zu committen."
          else
            git commit -m "Dashboard update $(date +'%d.%m.%Y %H:%M') UTC"
            git push
          fi

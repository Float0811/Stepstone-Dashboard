name: Stepstone Dashboard aktualisieren
'on':
  schedule:
    - cron: '30 5 * * 1-5'
  workflow_dispatch:
jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Playwright installieren
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Dashboard aktualisieren
        env:
          STEPSTONE_EMAIL: ${{ secrets.STEPSTONE_EMAIL }}
          STEPSTONE_PASSWORD: ${{ secrets.STEPSTONE_PASSWORD }}
        run: python scraper.py
      - name: Änderungen pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Dashboard update $(date +'%d.%m.%Y %H:%M') UTC"
            git push
          fi
